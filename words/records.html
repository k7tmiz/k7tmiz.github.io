<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>学习记录 - A4 Word Memory</title>
    <meta name="theme-color" content="#0b1220" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="A4 Memory" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="./assets/mask-icon.svg" color="#0b1220" />
    <link rel="apple-touch-icon" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="records-page">
    <header class="app-header no-print">
      <div class="title">
        <h1>学习记录</h1>
        <p class="subtitle">查看学习轮次、学习状态与导出记录</p>
      </div>
      <div class="status">
        <div class="status-top">
          <a class="button-link" href="./index.html">返回背单词</a>
          <button class="ghost" id="lookupBtn" type="button">查词</button>
          <button class="ghost" id="openSettingsBtn" type="button">设置</button>
        </div>
      </div>
    </header>

    <main class="app records">
      <section class="controls no-print records-controls-top" aria-label="视图与导出">
        <div class="view-tabs" role="tablist" aria-label="记录视图">
          <button class="ghost active" id="viewRoundsBtn" type="button" role="tab" aria-selected="true">
            轮次视图
          </button>
          <button class="ghost" id="viewStatusBtn" type="button" role="tab" aria-selected="false">状态视图</button>
        </div>
        <div class="records-controls-actions">
          <button class="primary" id="exportCsvBtn" type="button">导出 CSV</button>
          <button id="printPdfBtn" type="button">导出 PDF</button>
          <button class="ghost" id="clearBtn" type="button">清空记录</button>
        </div>
      </section>
      <div class="records-stats no-print" id="recordsStats"></div>

      <div class="empty hidden" id="emptyState">
        <div class="empty-title">还没有学习记录</div>
        <div class="empty-sub">回到背单词页面开始第一轮，记录会自动保存</div>
        <a class="button-link" href="./index.html">去背单词</a>
      </div>

      <section class="rounds" id="rounds"></section>
      <section class="rounds hidden" id="statusView"></section>
    </main>

    <script src="./data/words.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/core/common.js"></script>
    <script src="./js/speech.js"></script>
    <script src="./js/settings.js"></script>
    <script src="./js/lookup.js"></script>
    <script src="./js/records.js"></script>
  </body>
</html>
