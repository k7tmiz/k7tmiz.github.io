<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>学习记录 - A4 Word Memory</title>
    <meta name="theme-color" content="#0b1220" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="A4 Memory" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="./mask-icon.svg" color="#0b1220" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="app-header no-print">
      <div class="title">
        <h1>学习记录</h1>
        <p class="subtitle">按轮查看每张 A4 的日期与单词；支持导出 CSV 与打印 PDF</p>
      </div>
      <div class="status">
        <a class="button-link" href="./index.html">返回背单词</a>
      </div>
    </header>

    <main class="app records">
      <section class="controls no-print" aria-label="记录操作">
        <button class="primary" id="exportCsvBtn" type="button">导出 CSV（Excel）</button>
        <button id="exportJsonBtn" type="button">导出学习记录（JSON）</button>
        <button id="importJsonBtn" type="button">导入学习记录（JSON）</button>
        <input id="importJsonFile" type="file" accept=".json,application/json" hidden />
        <button id="printPdfBtn" type="button">打印 / 导出 PDF</button>
        <div class="spacer"></div>
        <button class="ghost" id="clearBtn" type="button">清空记录</button>
      </section>

      <div class="empty hidden" id="emptyState">
        <div class="empty-title">还没有学习记录</div>
        <div class="empty-sub">回到背单词页面开始第一轮，记录会自动保存</div>
        <a class="button-link" href="./index.html">去背单词</a>
      </div>

      <section class="rounds" id="rounds"></section>
    </main>

    <script src="./records.js"></script>
  </body>
</html>
