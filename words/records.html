<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>学习记录 - A4 Memory</title>
    <meta name="description" content="A4 Memory 学习记录 — 查看学习轮次、单词状态、导出 CSV/PDF。" />
    <meta name="theme-color" content="#0b1220" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.k7tmiz.com https://api.github.com https://api.dictionaryapi.dev https://api.mymemory.translated.net https://translate.google.com https://speech.platform.bing.com wss://speech.platform.bing.com https://api.openai.com https://api.anthropic.com https://generativelanguage.googleapis.com https://api.deepseek.com https://api.siliconflow.cn; media-src 'self' blob: https:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="A4 Memory" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="./assets/mask-icon.svg" color="#0b1220" />
    <link rel="apple-touch-icon" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./css/style.css?v=20260719-3" />
    <link rel="stylesheet" href="./css/theme.css?v=20260719-1" />
    <link rel="stylesheet" href="./css/shell.css?v=20260719-5" />
  </head>
  <body class="records-page">
    <main class="app records">
      <div class="page-heading">
        <h1>学习记录</h1>
        <p>回看轮次、状态与待复习内容</p>
      </div>
      <section class="controls no-print records-controls-top" aria-label="视图与导出">
        <div class="view-tabs" role="tablist" aria-label="记录视图">
          <button class="ghost active" id="viewRoundsBtn" type="button" role="tab" aria-selected="true">
            轮次视图
          </button>
          <button class="ghost" id="viewStatusBtn" type="button" role="tab" aria-selected="false">状态视图</button>
        </div>
        <div class="records-controls-actions">
          <button class="ghost" id="lookupBtn" type="button">查词</button>
          <button class="primary" id="exportCsvBtn" type="button">导出 CSV</button>
          <button id="printPdfBtn" type="button">导出 PDF</button>
          <button class="ghost" id="clearBtn" type="button">清空记录</button>
        </div>
      </section>
      <div class="records-stats no-print" id="recordsStats"></div>

      <div class="empty hidden" id="emptyState">
        <div class="empty-title">还没有学习记录</div>
        <div class="empty-sub">回到背单词页面开始第一轮，记录会自动保存</div>
        <a class="button-link" href="./index.html">去背单词</a>
      </div>

      <section class="rounds" id="rounds"></section>
      <section class="rounds hidden" id="statusView"></section>
    </main>

    <div class="app-dock-shell is-secondary" aria-label="记录页导航">
      <nav class="app-dock-nav" aria-label="主要导航">
        <a class="app-dock-item" href="./index.html" data-a4-page-transition>
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3.5 5.5h13v10h-13z"></path><path d="M6.5 3.5h7"></path></svg><span>学习</span>
        </a>
        <span class="app-dock-item active" aria-current="page">
          <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="6.2"></circle><path d="M10 6.5V10l2.7 1.7"></path></svg><span>记录</span>
        </span>
        <a href="./settings.html?from=records" class="app-dock-item" id="dockRecordsSettingsNav" data-a4-page-transition>
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3.5 5h13M3.5 10h13M3.5 15h13"></path><circle cx="7" cy="5" r="1.4"></circle><circle cx="13" cy="10" r="1.4"></circle><circle cx="8.5" cy="15" r="1.4"></circle></svg><span>设置</span>
        </a>
      </nav>
    </div>

    <script src="./data/words.js"></script>
    <script src="./js/utils.js?v=20260719-3"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/cloud.js?v=20260606-4"></script>
    <script src="./js/core/common.js?v=20260719-1"></script>
    <script src="./js/ui/layers.js?v=20260719-3"></script>
    <script src="./js/ui/motion.js?v=20260719-3"></script>
    <script src="./js/core/sanitize.js?v=20260714-2"></script>
    <script src="./js/speech.js?v=20260617-1"></script>
    <script src="./js/updater.js?v=20260714-1"></script>
    <script src="./js/settings.js?v=20260719-4"></script>
    <script src="./js/lookup.js"></script>
    <script src="./js/records.js?v=20260719-4"></script>
  </body>
</html>
