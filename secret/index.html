<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Secret</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --link: #58a6ff;
    --code-bg: #1c2128;
    --inline-code: #c9d1d9;
    --radius: 6px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
  header { padding: 48px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
  header h1 { font-size: 1.6rem; font-weight: 600; color: var(--text); }
  header p { color: var(--muted); font-size: 0.9rem; margin-top: 8px; }

  /* Post list */
  .post-list { list-style: none; }
  .post-item {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
    display: block;
    text-decoration: none;
    color: inherit;
  }
  .post-item:hover { opacity: 0.8; }
  .post-item .title { font-size: 1.15rem; font-weight: 600; color: var(--link); margin-bottom: 6px; }
  .post-item .meta { font-size: 0.85rem; color: var(--muted); }
  .post-item .excerpt { font-size: 0.9rem; color: var(--muted); margin-top: 8px; line-height: 1.6; }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 0.95rem; }

  /* Article view */
  .post-detail { display: none; }
  .post-detail.active { display: block; }
  .back-link {
    display: inline-block;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 32px;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--accent); }
  .back-link::before { content: "← "; }

  .post-detail .post-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .post-detail .post-date { font-size: 0.85rem; color: var(--muted); margin-bottom: 40px; }

  /* Markdown content styling */
  .content {
    font-size: 0.95rem;
    word-break: break-word;
  }
  .content h1, .content h2, .content h3, .content h4 {
    color: var(--text);
    margin: 2em 0 0.6em;
    font-weight: 600;
    line-height: 1.3;
  }
  .content h1 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .content h2 { font-size: 1.3rem; }
  .content h3 { font-size: 1.1rem; }
  .content p { margin: 0.8em 0; }
  .content a { color: var(--accent); text-decoration: none; }
  .content a:hover { text-decoration: underline; }
  .content blockquote {
    margin: 1em 0;
    padding: 8px 16px;
    border-left: 3px solid var(--accent);
    color: var(--muted);
    background: var(--card);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .content code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.85em;
    color: var(--inline-code);
    border: 1px solid var(--border);
  }
  .content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    overflow-x: auto;
    margin: 1em 0;
    line-height: 1.5;
  }
  .content pre code {
    background: none;
    padding: 0;
    border: none;
    font-size: 0.85em;
  }
  .content ul, .content ol { padding-left: 24px; margin: 0.6em 0; }
  .content li { margin: 0.3em 0; }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
  .content img { max-width: 100%; border-radius: var(--radius); margin: 1em 0; }
  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
  }
  .content th, .content td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
  }
  .content th { background: var(--card); font-weight: 600; }
  .content strong { color: var(--text); font-weight: 600; }

  /* hide view toggle */
  #list-view.hidden { display: none; }
  #list-view.hidden + .post-detail { display: block; }

  @media (max-width: 600px) {
    .container { padding: 24px 16px 40px; }
    header { padding: 32px 0 24px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Secret</h1>
    <p>一些不想放在主页的东西。</p>
  </header>

  <div id="list-view">
    <ul class="post-list" id="post-list"></ul>
    <div class="empty" id="empty-msg" style="display:none">暂无文章。</div>
  </div>

  <div class="post-detail" id="post-detail">
    <a class="back-link" id="back-btn">返回列表</a>
    <div class="post-title" id="detail-title"></div>
    <div class="post-date" id="detail-date"></div>
    <div class="content" id="detail-content"></div>
  </div>
</div>

<script>
(async () => {
  const listView = document.getElementById('list-view');
  const postList = document.getElementById('post-list');
  const emptyMsg = document.getElementById('empty-msg');
  const postDetail = document.getElementById('post-detail');
  const detailTitle = document.getElementById('detail-title');
  const detailDate = document.getElementById('detail-date');
  const detailContent = document.getElementById('detail-content');
  const backBtn = document.getElementById('back-btn');

  let posts = [];

  try {
    const res = await fetch('posts.json');
    posts = await res.json();
  } catch (e) {
    posts = [];
  }

  function renderList() {
    postList.innerHTML = '';
    if (posts.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';
    posts.forEach((p, i) => {
      const a = document.createElement('a');
      a.className = 'post-item';
      a.href = `#post/${p.file}`;
      a.innerHTML = `
        <div class="title">${esc(p.title)}</div>
        <div class="meta">${esc(p.date)}</div>
        ${p.excerpt ? `<div class="excerpt">${esc(p.excerpt)}</div>` : ''}
      `;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        showPost(p);
      });
      postList.appendChild(a);
    });
  }

  async function showPost(p) {
    listView.classList.add('hidden');
    postDetail.classList.add('active');
    detailTitle.textContent = p.title;
    detailDate.textContent = p.date;
    detailContent.innerHTML = '<p style="color:var(--muted)">加载中...</p>';

    try {
      const res = await fetch(`posts/${p.file}`);
      const md = await res.text();
      detailContent.innerHTML = marked.parse(md);
      document.title = p.title + ' · Secret';
    } catch (e) {
      detailContent.innerHTML = '<p style="color:#f85149">加载失败。</p>';
    }
    window.location.hash = `post/${p.file}`;
    window.scrollTo(0, 0);
  }

  function showList() {
    listView.classList.remove('hidden');
    postDetail.classList.remove('active');
    document.title = 'Secret';
    window.location.hash = '';
    window.scrollTo(0, 0);
  }

  backBtn.addEventListener('click', (e) => {
    e.preventDefault();
    showList();
  });

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Init
  renderList();

  // Handle hash on load
  const hash = window.location.hash;
  if (hash.startsWith('#post/')) {
    const file = hash.slice(6);
    const p = posts.find(p => p.file === file);
    if (p) showPost(p);
  }

  window.addEventListener('hashchange', () => {
    const h = window.location.hash;
    if (h.startsWith('#post/')) {
      const file = h.slice(6);
      const p = posts.find(p => p.file === file);
      if (p) showPost(p);
    } else {
      if (postDetail.classList.contains('active')) showList();
    }
  });
})();
</script>
</body>
</html>
